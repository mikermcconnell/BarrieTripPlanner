name: Detour Email Monitor

on:
  schedule:
    - cron: "*/5 * * * *"
  workflow_dispatch:
    inputs:
      send_test_email:
        description: "Send a synthetic test detour email"
        required: false
        default: "false"
        type: choice
        options:
          - "false"
          - "true"

concurrency:
  group: detour-email-monitor
  cancel-in-progress: false

jobs:
  detour-email-monitor:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: api-proxy/package-lock.json

      - name: Install api-proxy dependencies
        run: npm --prefix api-proxy ci --omit=dev --ignore-scripts

      - name: Send new detour email alerts
        if: ${{ github.event_name != 'workflow_dispatch' || inputs.send_test_email != 'true' }}
        env:
          DETOUR_DETECTOR_VERSION: v2
          DETOUR_ALERT_LOOKBACK_MIN: 30
          DETOUR_ALERT_MAX_EVENTS: 50
          DETOUR_ALERT_RECIPIENTS: ${{ secrets.DETOUR_ALERT_RECIPIENTS }}
          DETOUR_ALERT_FROM: ${{ secrets.DETOUR_ALERT_FROM }}
          DETOUR_ALERT_APP_URL: ${{ secrets.DETOUR_ALERT_APP_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT_JSON: ${{ secrets.FIREBASE_SERVICE_ACCOUNT_JSON }}
        run: npm --prefix api-proxy run detour:email-monitor

      - name: Send synthetic test detour email
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.send_test_email == 'true' }}
        env:
          DETOUR_ALERT_RECIPIENTS: ${{ secrets.DETOUR_ALERT_RECIPIENTS }}
          DETOUR_ALERT_FROM: ${{ secrets.DETOUR_ALERT_FROM }}
          DETOUR_ALERT_APP_URL: ${{ secrets.DETOUR_ALERT_APP_URL }}
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
        run: |
          node <<'NODE'
          const {
            buildEmailMessage,
            buildDetourStaticMapAttachment,
            sendViaResend,
          } = require('./api-proxy/services/detourEmailMonitor');

          const recipients = String(process.env.DETOUR_ALERT_RECIPIENTS || '')
            .split(',')
            .map((entry) => entry.trim())
            .filter(Boolean);
          const apiKey = String(process.env.RESEND_API_KEY || '').trim();
          const from = String(
            process.env.DETOUR_ALERT_FROM ||
              'BTTP Detour Alerts <onboarding@resend.dev>'
          ).trim();
          const appUrl = String(process.env.DETOUR_ALERT_APP_URL || '').trim();

          if (recipients.length === 0) {
            throw new Error('DETOUR_ALERT_RECIPIENTS is not configured');
          }
          if (!apiKey) {
            throw new Error('RESEND_API_KEY is not configured');
          }

          async function main() {
            const event = {
            eventType: 'DETOUR_DETECTED',
            routeId: '11',
            sharedRouteIds: ['11'],
            eventId: `test-route-11-duckworth-grove-${Date.now()}`,
            detourEventId: `test-route-11-duckworth-grove-${Date.now()}`,
            occurredAt: Date.now(),
            detectedAt: Date.now(),
            riderVisible: true,
            riderVisibilityReason: 'Synthetic public-detour email preview',
            confidence: 'high',
            eventConfidence: 'high',
            uniqueVehicleCount: 2,
            eventLocationLabel: 'Duckworth & Grove East',
            closedSegmentRoadNames: ['Grove Street East'],
            likelyDetourRoadNames: ['Duckworth Street', 'Bernick Drive', 'Cook Street'],
            skippedStops: [
              { stopCode: '335' },
              { stopCode: '328' },
            ],
            skippedSegmentPolyline: [
              { latitude: 44.4100, longitude: -79.6600 },
              { latitude: 44.4100, longitude: -79.6500 },
            ],
            likelyDetourPolyline: [
              { latitude: 44.4100, longitude: -79.6600 },
              { latitude: 44.4050, longitude: -79.6600 },
              { latitude: 44.4050, longitude: -79.6500 },
              { latitude: 44.4100, longitude: -79.6500 },
            ],
            canShowDetourPath: true,
            };

            const mapAttachment = await buildDetourStaticMapAttachment(event);
            const message = buildEmailMessage(event, { appUrl, mapAttachment });

            message.subject = `[TEST] ${message.subject}`;
            message.text = `This is a synthetic BTTP detour email test. No real detour was detected.\n\n${message.text}`;
            message.html = message.html.replace(
              '<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#333">',
              '<body style="margin:0;padding:0;font-family:Arial,Helvetica,sans-serif;font-size:14px;color:#333"><p style="max-width:680px;margin:16px auto;padding:12px;background:#fff3cd;border:1px solid #ffe08a"><strong>TEST ONLY:</strong> This is a synthetic BTTP detour email test. No real detour was detected.</p>'
            );

            const result = await sendViaResend({ apiKey, from, recipients, message });
            console.log('[detour-email-test]', JSON.stringify({
                ok: true,
                recipientCount: recipients.length,
                mapAttached: Boolean(mapAttachment),
                providerMessageId: result.id || result.messageId || null,
            }, null, 2));
          }

          main().catch((error) => {
            console.error(error);
            process.exit(1);
          });
          NODE


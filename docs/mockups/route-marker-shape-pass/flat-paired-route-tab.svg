<svg width="1200" height="760" viewBox="0 0 1200 760" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Flat paired route tab marker mockup for routes 7A and 7B</title>
  <desc id="desc">A flatter route-line label treatment that keeps 7A and 7B side-by-side, uses matching blue styling, includes opposite direction labels, and avoids pin or bus marker shapes.</desc>
  <defs>
    <filter id="softShadow" x="-20%" y="-30%" width="140%" height="170%">
      <feDropShadow dx="0" dy="4" stdDeviation="6" flood-color="#0f172a" flood-opacity="0.16"/>
    </filter>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f8fbff"/>
      <stop offset="1" stop-color="#eef7f4"/>
    </linearGradient>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M42 0H0V42" fill="none" stroke="#d7e2e0" stroke-width="1" opacity="0.52"/>
    </pattern>
    <style>
      .title { font: 900 34px Inter, Segoe UI, Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 600 18px Inter, Segoe UI, Arial, sans-serif; fill: #486581; }
      .section { font: 900 20px Inter, Segoe UI, Arial, sans-serif; fill: #102a43; }
      .note { font: 600 15px Inter, Segoe UI, Arial, sans-serif; fill: #52616b; }
      .small { font: 800 12px Inter, Segoe UI, Arial, sans-serif; fill: #0b5cad; letter-spacing: .08em; }
      .route { font: 900 44px Inter, Segoe UI, Arial, sans-serif; fill: #fff; letter-spacing: -1px; }
      .direction { font: 900 15px Inter, Segoe UI, Arial, sans-serif; fill: #0b5cad; letter-spacing: .06em; }
      .blue { fill: #0b5cad; }
      .routeLine { fill: none; stroke: #0b5cad; stroke-width: 12; stroke-linecap: round; opacity: .25; }
      .street { fill: none; stroke: #cbd5e1; stroke-width: 18; stroke-linecap: round; opacity: .58; }
      .streetCenter { fill: none; stroke: #ffffff; stroke-width: 8; stroke-linecap: round; opacity: .96; }
    </style>
  </defs>

  <rect width="1200" height="760" fill="#f8fbff"/>
  <rect x="48" y="42" width="1104" height="660" rx="34" fill="url(#mapBg)"/>
  <rect x="48" y="42" width="1104" height="660" rx="34" fill="url(#grid)" opacity=".9"/>

  <path d="M82 500 C 220 392, 338 512, 488 430 S 724 326, 894 420 S 1040 532, 1120 454" class="street"/>
  <path d="M82 500 C 220 392, 338 512, 488 430 S 724 326, 894 420 S 1040 532, 1120 454" class="streetCenter"/>
  <path d="M92 298 C 250 392, 390 292, 522 348 S 754 470, 918 334 S 1060 254, 1120 304" fill="none" stroke="#bfdbfe" stroke-width="9" stroke-linecap="round" opacity=".80"/>
  <path d="M96 574 C 248 482, 380 584, 522 520 S 746 428, 908 500 S 1042 606, 1114 548" fill="none" stroke="#fecdd3" stroke-width="8" stroke-linecap="round" opacity=".70"/>

  <text x="86" y="104" class="title">Shape pass: flat paired route tab</text>
  <text x="86" y="136" class="subtitle">Removes the pin pointer and bus-marker silhouette; reads more like a route-line label attached to the line.</text>

  <g transform="translate(300 246)" filter="url(#softShadow)">
    <!-- route rail behind marker, makes it feel attached to the line -->
    <path d="M-112 82 H602" class="routeLine"/>
    <circle cx="-112" cy="82" r="6" fill="#0b5cad" opacity=".25"/>
    <circle cx="602" cy="82" r="6" fill="#0b5cad" opacity=".25"/>

    <!-- one flatter shared shell, split into two adjacent route tabs -->
    <rect x="0" y="0" width="490" height="132" rx="18" fill="#ffffff" stroke="#0b5cad" stroke-width="3"/>
    <rect x="8" y="8" width="232" height="116" rx="14" class="blue"/>
    <rect x="250" y="8" width="232" height="116" rx="14" class="blue"/>
    <line x1="245" y1="18" x2="245" y2="114" stroke="#dbeafe" stroke-width="2" opacity=".85"/>

    <!-- direction labels integrated into the top edge, not floating above -->
    <rect x="28" y="22" width="190" height="30" rx="15" fill="#ffffff" opacity=".96"/>
    <rect x="272" y="22" width="190" height="30" rx="15" fill="#ffffff" opacity=".96"/>
    <text x="74" y="42" class="direction">← THIS WAY</text>
    <text x="307" y="42" class="direction">THIS WAY →</text>

    <text x="83" y="101" class="route">7A</text>
    <text x="325" y="101" class="route">7B</text>
  </g>

  <g transform="translate(180 464)">
    <text x="0" y="0" class="section">What changed from iteration 3</text>
    <text x="0" y="36" class="note">• No bottom notch or pin point — avoids looking like a vehicle or stop marker.</text>
    <text x="0" y="64" class="note">• Flatter shared shell — reads as signage attached to the route line.</text>
    <text x="0" y="92" class="note">• Direction labels are integrated into the tab instead of floating above it.</text>
    <text x="0" y="120" class="note">• Both 7A and 7B use identical blue styling; only the direction text changes.</text>
  </g>

  <g transform="translate(780 474)">
    <text x="0" y="0" class="section">Small zoom check</text>
    <g transform="translate(18 36) scale(.46)" filter="url(#softShadow)">
      <path d="M-112 82 H602" class="routeLine"/>
      <rect x="0" y="0" width="490" height="132" rx="18" fill="#ffffff" stroke="#0b5cad" stroke-width="3"/>
      <rect x="8" y="8" width="232" height="116" rx="14" class="blue"/>
      <rect x="250" y="8" width="232" height="116" rx="14" class="blue"/>
      <line x1="245" y1="18" x2="245" y2="114" stroke="#dbeafe" stroke-width="2" opacity=".85"/>
      <rect x="28" y="22" width="190" height="30" rx="15" fill="#ffffff" opacity=".96"/>
      <rect x="272" y="22" width="190" height="30" rx="15" fill="#ffffff" opacity=".96"/>
      <text x="74" y="42" class="direction">← THIS WAY</text>
      <text x="307" y="42" class="direction">THIS WAY →</text>
      <text x="83" y="101" class="route">7A</text>
      <text x="325" y="101" class="route">7B</text>
    </g>
    <text x="0" y="142" class="note">Still reads as a paired route label, not a bus marker.</text>
  </g>
</svg>


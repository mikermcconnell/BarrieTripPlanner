<svg width="1320" height="820" viewBox="0 0 1320 820" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Route marker design variations for Barrie Transit routes 7A and 7B</title>
  <desc id="desc">Three side-by-side route marker design concepts. Each concept keeps 7A and 7B adjacent for quick comparison.</desc>
  <defs>
    <filter id="softShadow" x="-30%" y="-30%" width="160%" height="180%">
      <feDropShadow dx="0" dy="5" stdDeviation="7" flood-color="#0f172a" flood-opacity="0.22"/>
    </filter>
    <filter id="lowShadow" x="-20%" y="-20%" width="140%" height="160%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#0f172a" flood-opacity="0.18"/>
    </filter>
    <linearGradient id="mapBg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#f7fafc"/>
      <stop offset="1" stop-color="#edf4f2"/>
    </linearGradient>
    <pattern id="grid" width="44" height="44" patternUnits="userSpaceOnUse">
      <path d="M44 0H0V44" fill="none" stroke="#d7e2e0" stroke-width="1" opacity="0.55"/>
    </pattern>
    <style>
      .title { font: 800 34px Inter, Segoe UI, Arial, sans-serif; fill: #102a43; }
      .subtitle { font: 500 18px Inter, Segoe UI, Arial, sans-serif; fill: #486581; }
      .card-title { font: 800 22px Inter, Segoe UI, Arial, sans-serif; fill: #102a43; }
      .card-copy { font: 500 15px Inter, Segoe UI, Arial, sans-serif; fill: #52616b; }
      .small-label { font: 700 12px Inter, Segoe UI, Arial, sans-serif; letter-spacing: .08em; fill: #64748b; }
      .route-num { font: 900 34px Inter, Segoe UI, Arial, sans-serif; fill: #fff; }
      .route-num-dark { font: 900 33px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .route-letter { font: 900 23px Inter, Segoe UI, Arial, sans-serif; fill: #fff; }
      .route-letter-dark { font: 900 22px Inter, Segoe UI, Arial, sans-serif; fill: #0f172a; }
      .badge-text { font: 900 27px Inter, Segoe UI, Arial, sans-serif; fill: #fff; }
      .caption { font: 600 13px Inter, Segoe UI, Arial, sans-serif; fill: #64748b; }
    </style>
  </defs>

  <rect width="1320" height="820" fill="#f8fbff"/>
  <rect x="46" y="40" width="1228" height="732" rx="34" fill="url(#mapBg)"/>
  <rect x="46" y="40" width="1228" height="732" rx="34" fill="url(#grid)" opacity=".9"/>
  <path d="M80 616 C 218 520, 300 614, 434 512 S 688 426, 822 518 S 1068 668, 1238 520" fill="none" stroke="#cbd5e1" stroke-width="18" stroke-linecap="round" opacity=".66"/>
  <path d="M86 612 C 224 516, 302 608, 434 506 S 686 420, 824 512 S 1072 662, 1232 514" fill="none" stroke="#ffffff" stroke-width="10" stroke-linecap="round" opacity=".95"/>
  <path d="M112 226 C 266 318, 384 232, 520 316 S 750 444, 896 330 S 1108 226, 1220 288" fill="none" stroke="#bfdbfe" stroke-width="9" stroke-linecap="round" opacity=".85"/>
  <path d="M146 682 C 244 612, 366 706, 492 648 S 672 552, 824 608 S 1080 700, 1194 640" fill="none" stroke="#fecdd3" stroke-width="7" stroke-linecap="round" opacity=".75"/>

  <text x="92" y="104" class="title">Route marker directions: 7A + 7B side-by-side</text>
  <text x="92" y="136" class="subtitle">Three compact options for map route labels where A/B branches need to be compared instantly.</text>

  <!-- Card 1 -->
  <g transform="translate(82 184)">
    <rect width="360" height="500" rx="28" fill="#ffffff" opacity=".93" filter="url(#softShadow)"/>
    <text x="30" y="48" class="small-label">OPTION 1</text>
    <text x="30" y="82" class="card-title">Twin pill</text>
    <text x="30" y="112" class="card-copy">One shared route family, split into A and B.</text>
    <text x="30" y="134" class="card-copy">Best when routes overlap tightly.</text>

    <g transform="translate(52 200)" filter="url(#lowShadow)">
      <rect x="0" y="0" width="246" height="74" rx="37" fill="#ffffff" stroke="#0b5cad" stroke-width="3"/>
      <rect x="8" y="8" width="112" height="58" rx="29" fill="#0b5cad"/>
      <rect x="126" y="8" width="112" height="58" rx="29" fill="#ffffff" stroke="#0b5cad" stroke-width="2"/>
      <line x1="123" y1="15" x2="123" y2="59" stroke="#dbeafe" stroke-width="2"/>
      <text x="32" y="47" class="route-num">7</text>
      <text x="74" y="47" class="route-letter">A</text>
      <text x="150" y="47" class="route-num-dark">7</text>
      <text x="192" y="47" class="route-letter-dark">B</text>
    </g>
    <g transform="translate(66 304)">
      <circle cx="11" cy="11" r="7" fill="#0b5cad"/>
      <text x="28" y="16" class="caption">Strong shared-family signal</text>
      <circle cx="11" cy="43" r="7" fill="#eff6ff" stroke="#0b5cad" stroke-width="2"/>
      <text x="28" y="48" class="caption">A vs B shown by fill treatment</text>
      <circle cx="11" cy="75" r="7" fill="#f59e0b"/>
      <text x="28" y="80" class="caption">Could add direction arrow if needed</text>
    </g>
  </g>

  <!-- Card 2 -->
  <g transform="translate(480 184)">
    <rect width="360" height="500" rx="28" fill="#ffffff" opacity=".93" filter="url(#softShadow)"/>
    <text x="30" y="48" class="small-label">OPTION 2</text>
    <text x="30" y="82" class="card-title">Paired map pins</text>
    <text x="30" y="112" class="card-copy">Two touching pins with letter tabs.</text>
    <text x="30" y="134" class="card-copy">Best when marker needs a precise point.</text>

    <g transform="translate(68 188)" filter="url(#lowShadow)">
      <g transform="translate(0 0)">
        <path d="M62 0 C 28 0, 0 27, 0 61 C 0 104, 62 144, 62 144 C 62 144, 124 104, 124 61 C 124 27, 96 0, 62 0 Z" fill="#0b5cad"/>
        <circle cx="62" cy="60" r="43" fill="#ffffff" opacity=".96"/>
        <text x="42" y="73" class="route-num-dark">7</text>
        <rect x="38" y="94" width="48" height="29" rx="14" fill="#0b5cad"/>
        <text x="54" y="116" class="route-letter">A</text>
      </g>
      <g transform="translate(92 0)">
        <path d="M62 0 C 28 0, 0 27, 0 61 C 0 104, 62 144, 62 144 C 62 144, 124 104, 124 61 C 124 27, 96 0, 62 0 Z" fill="#ffffff" stroke="#0b5cad" stroke-width="5"/>
        <circle cx="62" cy="60" r="41" fill="#eff6ff"/>
        <text x="42" y="73" class="route-num-dark">7</text>
        <rect x="38" y="94" width="48" height="29" rx="14" fill="#ffffff" stroke="#0b5cad" stroke-width="3"/>
        <text x="53" y="116" class="route-letter-dark">B</text>
      </g>
    </g>
    <g transform="translate(66 354)">
      <circle cx="11" cy="11" r="7" fill="#0b5cad"/>
      <text x="28" y="16" class="caption">Most map-marker-like</text>
      <circle cx="11" cy="43" r="7" fill="#eff6ff" stroke="#0b5cad" stroke-width="2"/>
      <text x="28" y="48" class="caption">A/B visible at a glance</text>
      <circle cx="11" cy="75" r="7" fill="#f59e0b"/>
      <text x="28" y="80" class="caption">Takes the most map space</text>
    </g>
  </g>

  <!-- Card 3 -->
  <g transform="translate(878 184)">
    <rect width="360" height="500" rx="28" fill="#ffffff" opacity=".93" filter="url(#softShadow)"/>
    <text x="30" y="48" class="small-label">OPTION 3</text>
    <text x="30" y="82" class="card-title">Route stack tabs</text>
    <text x="30" y="112" class="card-copy">Slim tabs sit beside the route line.</text>
    <text x="30" y="134" class="card-copy">Best for dense downtown map areas.</text>

    <g transform="translate(46 210)" filter="url(#lowShadow)">
      <rect x="0" y="22" width="270" height="18" rx="9" fill="#0b5cad" opacity=".30"/>
      <rect x="14" y="0" width="116" height="62" rx="17" fill="#0b5cad"/>
      <path d="M112 0 h18 v18 z" fill="#073b73" opacity=".8"/>
      <text x="37" y="40" class="badge-text">7A</text>
      <rect x="136" y="0" width="116" height="62" rx="17" fill="#ffffff" stroke="#0b5cad" stroke-width="3"/>
      <path d="M234 0 h18 v18 z" fill="#dbeafe"/>
      <text x="159" y="40" class="route-num-dark">7B</text>
      <path d="M66 72 l10 12 l10 -12" fill="#0b5cad"/>
      <path d="M188 72 l10 12 l10 -12" fill="#ffffff" stroke="#0b5cad" stroke-width="3" stroke-linejoin="round"/>
    </g>
    <g transform="translate(66 320)">
      <circle cx="11" cy="11" r="7" fill="#0b5cad"/>
      <text x="28" y="16" class="caption">Smallest visual footprint</text>
      <circle cx="11" cy="43" r="7" fill="#eff6ff" stroke="#0b5cad" stroke-width="2"/>
      <text x="28" y="48" class="caption">Reads like route labels, not pins</text>
      <circle cx="11" cy="75" r="7" fill="#f59e0b"/>
      <text x="28" y="80" class="caption">Recommended first implementation</text>
    </g>
  </g>

  <text x="92" y="736" class="subtitle">My recommendation: Option 3 for the route-line labels; Option 2 only if these need to behave like tappable map pins.</text>
</svg>

<!DOCTYPE html>
<html lang="%LANG_ISO_CODE%">
  <head>
    <meta charset="utf-8" />
    <meta httpEquiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no" />
    <title>%WEB_TITLE%</title>
    <style id="expo-reset">
      html,
      body {
        height: 100%;
      }

      body {
        margin: 0;
        overflow: hidden;
        background: #ffffff;
      }

      #root {
        display: flex;
        height: 100%;
        flex: 1;
      }

      .startup-shell {
        min-height: 100vh;
        width: 100%;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #ffffff;
        color: #172b4d;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      .startup-card {
        width: min(360px, calc(100vw - 48px));
        box-sizing: border-box;
        padding: 24px;
        border-radius: 24px;
        background: #f7fbff;
        box-shadow: 0 12px 30px rgba(23, 43, 77, 0.1);
        text-align: center;
      }

      .startup-icon {
        font-size: 40px;
        margin-bottom: 12px;
      }

      .startup-title {
        margin: 0;
        font-size: 24px;
        line-height: 30px;
        font-weight: 800;
      }

      .startup-detail {
        margin: 10px 0 0;
        font-size: 15px;
        line-height: 22px;
        color: #42526e;
      }
    </style>
  </head>

  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root">
      <div class="startup-shell" role="status" aria-live="polite">
        <div class="startup-card">
          <div class="startup-icon" aria-hidden="true">🚌</div>
          <h1 class="startup-title">MyBarrie Transit</h1>
          <p class="startup-detail">Loading routes, stops, and live updates</p>
        </div>
      </div>
    </div>
  </body>
</html>
